<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.changelog viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c0f;
      --bg2: #0f1215;
      --bg3: #151a1f;
      --border: #1e2530;
      --border2: #263040;
      --text: #c8d8e8;
      --text-dim: #5a7080;
      --text-mute: #334455;
      --accent: #00d4ff;
      --accent2: #0088aa;
      --green: #00e676;
      --red: #ff4444;
      --yellow: #ffcc00;
      --orange: #ff8800;
      --purple: #bb86fc;
      --pink: #ff6eb4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-stats {
      display: flex;
      gap: 20px;
    }

    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .stat-chip .lbl {
      color: var(--text-mute);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-chip .val {
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
    }

    .container {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: calc(100vh - 69px);
    }

    aside {
      border-right: 1px solid var(--border);
      background: var(--bg2);
      padding: 16px 0;
      position: sticky;
      top: 69px;
      height: calc(100vh - 69px);
      overflow-y: auto;
    }

    .aside-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-mute);
      padding: 10px 14px 6px;
      display: block;
    }

    .search-wrap {
      margin: 0 14px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 7px 10px;
    }

    .search-wrap:focus-within {
      border-color: var(--accent2);
    }

    .search-wrap span {
      color: var(--text-dim);
    }

    .search-wrap input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 100%;
    }

    .search-wrap input::placeholder {
      color: var(--text-mute);
    }

    .branch-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all .15s;
      color: var(--text-dim);
      font-size: 12px;
    }

    .branch-item:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .branch-item.active {
      border-left-color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
      color: var(--accent);
    }

    .branch-item .bname {
      display: flex;
      align-items: center;
      gap: 7px;
      overflow: hidden;
    }

    .branch-item .bname span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 10px;
      padding: 1px 6px;
      min-width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .branch-item.active .badge {
      background: rgba(0, 212, 255, 0.1);
      border-color: var(--accent2);
      color: var(--accent);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 14px 10px;
    }

    .chip {
      padding: 3px 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      transition: all .15s;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .chip:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .chip.active {
      border-color: var(--accent2);
      background: rgba(0, 212, 255, 0.1);
      color: var(--accent);
    }

    main {
      padding: 24px 28px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .view-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
    }

    .view-title .btag {
      color: var(--accent);
      font-size: 13px;
      font-weight: 400;
      font-family: 'JetBrains Mono', monospace;
    }

    .result-count {
      color: var(--text-mute);
      font-size: 11px;
    }

    .commits-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      transition: border-color .2s;
      animation: fs .25s ease both;
    }

    @keyframes fs {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .card:hover {
      border-color: var(--border2);
    }

    .card.open {
      border-color: var(--accent2);
    }

    .card-header {
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      cursor: pointer;
    }

    .type-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 2px 6px;
      border: 1px solid;
      min-width: 50px;
      text-align: center;
      flex-shrink: 0;
    }

    .t-feat {
      color: var(--green);
      border-color: var(--green);
      background: rgba(0, 230, 118, .06)
    }

    .t-fix {
      color: var(--red);
      border-color: var(--red);
      background: rgba(255, 68, 68, .06)
    }

    .t-docs {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0, 212, 255, .06)
    }

    .t-style {
      color: var(--pink);
      border-color: var(--pink);
      background: rgba(255, 110, 180, .06)
    }

    .t-refactor {
      color: var(--purple);
      border-color: var(--purple);
      background: rgba(187, 134, 252, .06)
    }

    .t-perf {
      color: var(--orange);
      border-color: var(--orange);
      background: rgba(255, 136, 0, .06)
    }

    .t-test {
      color: var(--yellow);
      border-color: var(--yellow);
      background: rgba(255, 204, 0, .06)
    }

    .t-chore,
    .t-build,
    .t-ci,
    .t-other {
      color: var(--text-dim);
      border-color: var(--border2)
    }

    .card-info {
      overflow: hidden;
    }

    .card-subject {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-subject .scope {
      color: var(--accent2);
      font-weight: 400;
    }

    .card-meta {
      display: flex;
      gap: 10px;
      margin-top: 3px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-meta .sep {
      color: var(--text-mute);
    }

    .card-stats {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
      font-size: 11px;
    }

    .sa {
      color: var(--green)
    }

    .sd {
      color: var(--red)
    }

    .card-hash {
      color: var(--accent2);
      font-size: 11px;
      flex-shrink: 0;
    }

    .expand-btn {
      color: var(--text-mute);
      font-size: 10px;
      transition: transform .2s, color .2s;
      flex-shrink: 0;
    }

    .card.open .expand-btn {
      transform: rotate(90deg);
      color: var(--accent);
    }

    .card-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 14px;
      background: var(--bg);
    }

    .card.open .card-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      animation: fs .2s ease;
    }

    .dl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-mute);
      margin-bottom: 5px;
    }

    .dv {
      color: var(--text);
      font-size: 12px;
      line-height: 1.6;
    }

    .dv.mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .dv.dim {
      color: var(--text-dim);
      font-style: italic;
    }

    .dbox {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 8px 10px;
    }

    .dsec {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .files-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .fst {
      font-size: 9px;
      font-weight: 700;
      min-width: 12px;
    }

    .fst-A {
      color: var(--green)
    }

    .fst-M {
      color: var(--yellow)
    }

    .fst-D {
      color: var(--red)
    }

    .fst-R {
      color: var(--purple)
    }

    .fpath .fdir {
      color: var(--text-mute)
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 10px;
      color: var(--text-mute);
      text-align: center;
    }

    .empty .icon {
      font-size: 36px;
      margin-bottom: 6px;
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2)
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent2)
    }

    @media(max-width:700px) {
      .container {
        grid-template-columns: 1fr
      }

      aside {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border)
      }

      .card-header {
        grid-template-columns: auto 1fr auto
      }

      .card-stats {
        display: none
      }

      .card.open .card-detail {
        grid-template-columns: 1fr
      }

      header {
        flex-direction: column;
        gap: 10px;
        align-items: flex-start
      }
    }
  </style>
</head>

  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <div class="logo-text"><span>.changelog</span> viewer</div>
    </div>
    <div class="header-stats">
      <div class="stat-chip"><span class="lbl">proyecto</span><span class="val" id="hProject">—</span></div>
      <div class="stat-chip"><span class="lbl">commits</span><span class="val" id="hCommits">—</span></div>
      <div class="stat-chip"><span class="lbl">ramas</span><span class="val" id="hBranches">—</span></div>
      <div class="stat-chip"><span class="lbl">actualizado</span><span class="val" id="hUpdated"
          style="font-size:10px">—</span></div>
    </div>
  </header>

  <div class="container">
    <aside>
      <div class="search-wrap">
        <span>⌕</span>
        <input type="text" id="searchInput" placeholder="Buscar commits...">
      </div>
      <span class="aside-label">Ramas</span>
      <div id="branchList"></div>
      <span class="aside-label" style="margin-top:6px">Tipo</span>
      <div class="filter-row" id="typeFilters"></div>
      <span class="aside-label" style="margin-top:6px">Autor</span>
      <div class="filter-row" id="authorFilters"></div>
    </aside>

    <main>
      <div class="toolbar">
        <div class="view-title">Commits <span class="btag" id="branchTag"></span></div>
        <div class="result-count" id="resultCount"></div>
      </div>
      <div class="commits-list" id="commitsList"></div>
    </main>
  </div>

  <script>
    // ── Estado ───────────────────────────────────────────────────
    const S = { activeBranch: 'all', types: new Set(), authors: new Set(), search: '' };

    // ── Helpers ──────────────────────────────────────────────────
    const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso), p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function fmtShort(iso) {
      if (!iso) return '—';
      const d = new Date(iso), p = n => String(n).padStart(2, '0');
      return `${p(d.getDate())}/${p(d.getMonth() + 1)} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    const statusChar = s => ({ added: 'A', modified: 'M', deleted: 'D', renamed: 'R', copied: 'C' }[s] || '?');

    // ── Datos ────────────────────────────────────────────────────
    function getData() {
      if (!window.__CHANGELOG__) return null;
      return window.__CHANGELOG__;
    }

    function allCommits() {
      const data = getData(); if (!data) return [];
      return Object.entries(data.branches)
        .flatMap(([file, bd]) => (bd.commits || []).map(c => ({ ...c, _file: file })))
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }

    function branchCommits() {
      const data = getData(); if (!data) return [];
      if (S.activeBranch === 'all') return allCommits();
      const bd = data.branches[S.activeBranch];
      return (bd?.commits || []).map(c => ({ ...c, _file: S.activeBranch }));
    }

    function filtered() {
      let cs = branchCommits();
      if (S.types.size) cs = cs.filter(c => S.types.has(c.type));
      if (S.authors.size) cs = cs.filter(c => S.authors.has(c.author?.name));
      if (S.search) {
        const q = S.search.toLowerCase();
        cs = cs.filter(c =>
          (c.message || '').toLowerCase().includes(q) ||
          (c.description || '').toLowerCase().includes(q) ||
          (c.notes || '').toLowerCase().includes(q) ||
          (c.author?.name || '').toLowerCase().includes(q) ||
          (c.hash || '').toLowerCase().includes(q) ||
          (c.files || []).some(f => (f.file || '').toLowerCase().includes(q))
        );
      }
      return cs;
    }

    // ── Render header ─────────────────────────────────────────────
    function renderHeader() {
      const data = getData();
      if (!data) {
        document.getElementById('hProject').textContent = 'Sin datos';
        return;
      }
      const p = data.index?.project || {}, s = data.index?.stats || {};
      document.getElementById('hProject').textContent = p.name || '—';
      document.getElementById('hCommits').textContent = s.total_commits ?? '—';
      document.getElementById('hBranches').textContent = s.total_branches ?? '—';
      document.getElementById('hUpdated').textContent = fmtShort(s.last_updated);
      document.title = `.changelog — ${p.name || 'viewer'}`;
    }

    // ── Render sidebar ────────────────────────────────────────────
    function renderSidebar() {
      const data = getData();
      const branches = data?.index?.branches || [];
      const all = allCommits();

      // Ramas
      let html = `<div class="branch-item ${S.activeBranch === 'all' ? 'active' : ''}" data-b="all">
    <div class="bname"><span>◆</span><span>Todas las ramas</span></div>
    <span class="badge">${all.length}</span>
  </div>`;
      for (const b of branches) {
        const count = (data.branches[b.file]?.commits || []).length;
        html += `<div class="branch-item ${S.activeBranch === b.file ? 'active' : ''}" data-b="${esc(b.file)}">
      <div class="bname"><span>⎇</span><span title="${esc(b.name)}">${esc(b.name)}</span></div>
      <span class="badge">${count}</span>
    </div>`;
      }
      const bl = document.getElementById('branchList');
      bl.innerHTML = html;
      bl.querySelectorAll('.branch-item').forEach(el => el.addEventListener('click', () => {
        S.activeBranch = el.dataset.b; S.types.clear(); S.authors.clear();
        renderSidebar(); renderCommits();
      }));

      // Tipos presentes
      const bc = branchCommits();
      const types = [...new Set(bc.map(c => c.type).filter(Boolean))].sort();
      document.getElementById('typeFilters').innerHTML = types.map(t =>
        `<div class="chip ${S.types.has(t) ? 'active' : ''}" data-t="${esc(t)}">${esc(t)}</div>`
      ).join('');
      document.getElementById('typeFilters').querySelectorAll('.chip').forEach(el => el.addEventListener('click', () => {
        const t = el.dataset.t; S.types.has(t) ? S.types.delete(t) : S.types.add(t);
        renderSidebar(); renderCommits();
      }));

      // Autores presentes
      const authors = [...new Set(bc.map(c => c.author?.name).filter(Boolean))].sort();
      document.getElementById('authorFilters').innerHTML = authors.map(a =>
        `<div class="chip ${S.authors.has(a) ? 'active' : ''}" data-a="${esc(a)}">${esc(a)}</div>`
      ).join('');
      document.getElementById('authorFilters').querySelectorAll('.chip').forEach(el => el.addEventListener('click', () => {
        const a = el.dataset.a; S.authors.has(a) ? S.authors.delete(a) : S.authors.add(a);
        renderSidebar(); renderCommits();
      }));
    }

    // ── Render commits ────────────────────────────────────────────
    function renderCommits() {
      const data = getData();
      const cs = filtered();
      const list = document.getElementById('commitsList');

      let btag = '';
      if (S.activeBranch !== 'all') {
        const b = (data?.index?.branches || []).find(b => b.file === S.activeBranch);
        if (b) btag = `— ${b.name}`;
      }
      document.getElementById('branchTag').textContent = btag;
      document.getElementById('resultCount').textContent = cs.length ? `${cs.length} commit${cs.length !== 1 ? 's' : ''}` : '';

      if (!cs.length) {
        list.innerHTML = `<div class="empty"><div class="icon">◌</div><p>No hay commits con los filtros actuales.</p></div>`;
        return;
      }
      list.innerHTML = cs.map((c, i) => renderCard(c, i)).join('');
      list.querySelectorAll('.card-header').forEach(el => el.addEventListener('click', () => {
        el.closest('.card').classList.toggle('open');
      }));
    }

    function renderCard(c, i) {
      const type = c.type || 'other';
      const scopeHtml = c.scope ? `<span class="scope">(${esc(c.scope)})</span> ` : '';
      const files = c.files || [];
      const filesHtml = files.length
        ? files.map(f => {
          const parts = (f.file || '').split('/'), fname = parts.pop(), dir = parts.length ? parts.join('/') + '/' : '';
          const sc = statusChar(f.status);
          return `<div class="file-row"><span class="fst fst-${sc}">${sc}</span><span class="fpath"><span class="fdir">${esc(dir)}</span>${esc(fname)}</span></div>`;
        }).join('')
        : '<span style="color:var(--text-mute);font-size:11px">—</span>';

      const branchLine = S.activeBranch === 'all'
        ? `<span class="sep">·</span><span>⎇ ${esc(c.branch || '')}</span>` : '';

      const descBox = c.description
        ? `<div><div class="dl">Descripción</div><div class="dbox dv">${esc(c.description)}</div></div>` : '';
      const notesBox = c.notes
        ? `<div><div class="dl">Notas para el equipo</div><div class="dbox dv">${esc(c.notes)}</div></div>` : '';

      return `<div class="card" style="animation-delay:${i * .025}s">
    <div class="card-header">
      <span class="type-badge t-${esc(type)}">${esc(type)}</span>
      <div class="card-info">
        <div class="card-subject">${scopeHtml}${esc(c.subject || c.message)}</div>
        <div class="card-meta">
          <span>${esc(c.author?.name || '—')}</span>
          <span class="sep">·</span><span>${fmtDate(c.date)}</span>
          ${branchLine}
        </div>
      </div>
      <div class="card-stats">
        ${(c.stats?.lines_added > 0) ? `<span class="sa">+${c.stats.lines_added}</span>` : ''}
        ${(c.stats?.lines_deleted > 0) ? `<span class="sd">-${c.stats.lines_deleted}</span>` : ''}
        <span style="color:var(--text-mute)">${c.stats?.files_changed || 0} arch.</span>
      </div>
      <span class="card-hash">${esc(c.hash || '')}</span>
      <span class="expand-btn">▶</span>
    </div>
    <div class="card-detail">
      <div class="dsec">
        ${descBox}${notesBox}
        <div><div class="dl">Hash completo</div><div class="dv mono" style="font-size:10px;color:var(--text-dim)">${esc(c.hash_full || c.hash || '—')}</div></div>
        <div><div class="dl">Autor</div><div class="dv">${esc(c.author?.name || '—')} <span style="color:var(--text-mute)">&lt;${esc(c.author?.email || '')}&gt;</span></div></div>
        <div><div class="dl">Fecha</div><div class="dv mono">${esc(c.date || '—')}</div></div>
      </div>
      <div class="dsec">
        <div><div class="dl">Archivos (${files.length})</div><div class="dbox files-list">${filesHtml}</div></div>
      </div>
    </div>
  </div>`;
    }

    // ── Search ────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      S.search = e.target.value.trim(); renderCommits();
    });

    // ── Init ──────────────────────────────────────────────────────
    (function init() {
      const data = getData();
      if (!data || !data.index) {
        document.getElementById('commitsList').innerHTML = `
      <div class="empty">
        <div class="icon">◌</div>
        <p>Aún no hay commits documentados.<br>
        Haz tu primer <strong>git commit</strong> y los datos aparecerán aquí.</p>
      </div>`;
        document.getElementById('hProject').textContent = 'Sin datos';
        return;
      }
      renderHeader();
      renderSidebar();
      renderCommits();
    })();
  </script>
</body>

</html>
