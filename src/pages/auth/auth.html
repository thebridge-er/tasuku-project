<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASUKU Login</title>
    <link rel="stylesheet" href="../../components/buttons/buttons.css">
    <link rel="stylesheet" href="./auth.css">
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/main.css">
</head>

<body>

    <div id="header-container"></div>

    <section class="auth" id="authSection">
        <div class="auth-card">
            <h2 id="formTitle">Login</h2>
            <!--  <p id="formSub">Accede a tu espacio</p>-->

            <input id="nameField" placeholder="Nombre" style="display:none">
            <label>Correo</label>
            <input id="email" placeholder="email@ejemplo.com" autocomplete="off">
            <label>Contraseña</label>

            <input id="password" type="password" placeholder="********" autocomplete="off">
            <button id="mainBtn">Iniciar Sesión</button>
            <p id="errorMsg" class="error-msg"></p>
            <p id="switchText">
                ¿No tienes cuenta?
                <span id="registerLink">Registrarse</span>
            </p>
        </div>
    </section>

    <div id="footer"></div>
    <script type="module" src="../../app.js"></script>
    <script src="./auth.js"></script>
</body>


</html>
