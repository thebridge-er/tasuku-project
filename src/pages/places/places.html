<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tasuku - Espacios</title>

    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/main.css" />
    <link rel="stylesheet" href="places.css" />
  </head>

  <body>
    <header class="landing-header">
      <div class="logo">
        <a href="index.html">
          <div class="logo-icon">🏠</div>
        </a>
        <h1 data-translation="app_name">TASUKU</h1>
      </div>

      <div class="header-right">
        <button id="style-mode">
          <div id="icon-moon" class="theme-icon">🌙</div>
          <div id="icon-sun" class="theme-icon">☀️</div>
        </button>
        <!-- <button id="lang-btn" class="style-mode">🌐</button> -->
        <select id="lang" class="lang-select">
          <option value="en">🇬🇧 EN</option>
          <option value="es">🇪🇸 ES</option>
          <option value="eus">🏴 EUS</option>
        </select>
        <button class="login-btn" data-translation="welcome"></button>
        
      </div>
    </header>

    <section id="places">
      <div class="places-top">
        <h2>Mis espacios</h2>
        <button class="main-btn" onclick="openCreate()">+ Crear Espacio</button>
        <button class="secondary-btn" onclick="openJoin()">Unirse a Espacio</button>
      </div>

      <div class="spaces-list" id="spacesContainer">
        <!-- espacios creados por JS -->
      </div>
    </section>
   
 

  </body>  
    <script type="module" src="../../app.js"></script>
    <script type="module" src="places.js"></script>
</html>
