<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ONBOARDING</title>

    <link rel="stylesheet" href="../../styles/main.css" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="./onboarding.css" />
  </head>

  <body>
    <header class="landing-header">
      <div class="logo">
        <a href="index.html">
          <div class="logo-icon">🏠</div>
        </a>
        <h1 data-translation="app_name">TASUKU</h1>
      </div>

      <div class="header-right">
        <button id="style-mode">
          <div id="icon-moon" class="theme-icon">🌙</div>
          <div id="icon-sun" class="theme-icon">☀️</div>
        </button>
        <!-- <button id="lang-btn" class="style-mode">🌐</button> -->
        <select id="lang" class="lang-select">
          <option value="en">🇬🇧 EN</option>
          <option value="es">🇪🇸 ES</option>
          <option value="eus">🏴 EUS</option>
        </select>
        <button class="login-btn" data-translation="welcome"></button>

      </div>
    </header>
    <section id="dashboard">
      <div class="welcome">
        <img id="avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=user"/>

        <h2 id="welcomeName">Bienvenido</h2>

        <p>Crea o únete a un espacio para empezar</p>

        <button class="main-btn" onclick="openCreate()">+ Crear Espacio</button>
        <button class="secondary-btn" onclick="openJoin()">Unirse a Espacio</button>
      </div>
    </section>

    <section id="espacio"></section>
    <section id="perfil"></section>
  </body>
  <script type="module" src="../../app.js"></script>
  <script type="module" src="onboarding.js"></script>
</html>
