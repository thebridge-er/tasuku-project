<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Componentes</title>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../../src/components/footer/footer.css" />
    <link rel="stylesheet" href="../../src/components/header/header.css" />
    <link rel="stylesheet" href="../../src/components/buttons/buttons.css" />
    <link rel="stylesheet" href="../../src/components/cards/cards.css" />
    <link rel="stylesheet" href="../../src/components/inputs/inputs.css" />
  </head>
  <body>
    <!-- Botón con texto -->
    <ui-button text="Guardar"></ui-button>

    <!-- Botón con icono a la izquierda -->
    <ui-button text="Guardar" icon-left="../../assets/images/icons/chevron.svg"></ui-button>

    <!-- Botón con icono a la derecha -->
    <ui-button text="Siguiente" icon-right="../../assets/images/icons/chevron.svg"></ui-button>

    <!-- Botón solo icono (usa :before via CSS) -->
    <ui-button icon="assets/icons/menu.svg"></ui-button>

    <!-- Botón circular -->
    <ui-button icon="assets/icons/plus.svg" circle></ui-button>

    <!-- Botón dark mode toggle -->
    <ui-button id="style-mode"></ui-button>

    <!-- Con dark mode activo -->
    <ui-button id="style-mode" dark-mode></ui-button>
    <!-- SCRIPTS -->
    <script type="module" src="components.js"></script>
  </body>
</html>
